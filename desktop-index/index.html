<script>
let treeData = null;
let clickToCopy = false;

function fmtSize(bytes) {
  if (bytes == null) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + 'MB';
  return (bytes/1024/1024/1024).toFixed(1) + 'GB';
}
function countAll(node) {
  if (!node.is_dir) return { f: 1, sd: 0 };
  let r = { f: 0, sd: 1 };
  for (const c of node.children || []) {
    const sub = countAll(c);
    r.f += sub.f; r.sd += sub.sd;
  }
  return r;
}
function renderNode(node, container, isRoot = false) {
  const wrap = document.createElement('div');
  wrap.className = 'node';
  if (!isRoot) wrap.dataset.searchText = (node.path + ' ' + node.name).toLowerCase();
  const row = document.createElement('div');
  row.className = 'node-row';
  const toggle = document.createElement('span');
  toggle.className = 'toggle';
  if (node.is_dir && (node.children || []).length > 0) {
    toggle.textContent = '▶';
    toggle.dataset.state = 'collapsed';
  }
  const icon = document.createElement('span');
  icon.className = 'icon ' + (node.is_dir ? 'folder' : 'file');
  icon.textContent = node.is_dir ? '📁' : '📄';
  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = node.name;
  label.title = node.path;
  const size = document.createElement('span');
  size.className = 'size';
  if (node.is_dir) {
    const c = countAll(node);
    size.textContent = c.f + ' 文件 · ' + c.sd + ' 文件夹';
  } else {
    size.textContent = fmtSize(node.size);
  }
  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(label);
  if (!isRoot) row.appendChild(size);
  const childrenWrap = document.createElement('div');
  childrenWrap.className = 'children collapsed';
  if (node.is_dir && (node.children || []).length > 0) {
    for (const c of node.children) renderNode(c, childrenWrap);
  } else if (node.is_dir && node.truncated) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '(深度已截断)';
    childrenWrap.appendChild(empty);
  }
  toggle.addEventListener('click', e => {
    e.stopPropagation();
    if (!node.is_dir) return;
    if (childrenWrap.classList.contains('collapsed')) {
      childrenWrap.classList.remove('collapsed');
      toggle.textContent = '▼';
    } else {
      childrenWrap.classList.add('collapsed');
      toggle.textContent = '▶';
    }
  });
  label.addEventListener('click', e => {
    e.stopPropagation();
    if (clickToCopy) {
      navigator.clipboard.writeText(node.path).then(() => {
        showToast('✓ 已复制：' + node.path);
      });
    } else if (node.is_dir) {
      toggle.click();
    }
  });
  if (isRoot) {
    childrenWrap.classList.remove('collapsed');
    if (toggle) toggle.textContent = '▼';
  }
  wrap.appendChild(row);
  wrap.appendChild(childrenWrap);
  container.appendChild(wrap);
}
function expandAll() {
  document.querySelectorAll('.children').forEach(el => el.classList.remove('collapsed'));
  document.querySelectorAll('.toggle').forEach(el => { if (el.dataset.state !== undefined) el.textContent = '▼'; });
}
function collapseAll() {
  const trees = document.querySelectorAll('.tree-container > .node');
  trees.forEach(root => {
    const children = root.querySelectorAll(':scope > .children');
    children.forEach(c => c.classList.add('collapsed'));
    const rootToggle = root.querySelector(':scope > .node-row > .toggle');
    if (rootToggle && rootToggle.dataset.state !== undefined) rootToggle.textContent = '▶';
    const rootChildren = root.querySelector(':scope > .children');
    if (rootChildren) rootChildren.classList.remove('collapsed');
  });
}
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 2000);
}
function applyFilter(q) {
  q = q.trim().toLowerCase();
  const roots = document.querySelectorAll('.tree-container > .node');
  if (!q) {
    document.querySelectorAll('.node').forEach(n => n.style.display = '');
    collapseAll();
    return;
  }
  document.querySelectorAll('.node').forEach(node => {
    const text = node.dataset.searchText || '';
    const match = text.includes(q);
    node.style.display = match ? '' : 'none';
    if (match) {
      let p = node.parentElement;
      while (p && !p.classList.contains('tree-container')) {
        if (p.classList.contains('children')) {
          p.classList.remove('collapsed');
          const toggle = p.previousElementSibling?.querySelector?.('.toggle');
          if (toggle && toggle.dataset.state !== undefined) toggle.textContent = '▼';
        }
        p = p.parentElement;
      }
    }
  });
}
function load() {
  const data = window.TREE_DATA || [];
  const root = document.getElementById('tree');
  root.innerHTML = '';
  let total = { f: 0, sd: 0 };
  for (const r of data) {
    renderNode(r.tree, root, true);
    const s = countAll(r.tree);
    total.f += s.f; total.sd += s.sd;
  }
  document.getElementById('stat-folders').textContent = total.sd + ' 文件夹';
  document.getElementById('stat-files').textContent = total.f + ' 文件';
  document.getElementById('stat-source').textContent = data.map(t => t.root).join(' · ');
  document.getElementById('update-time').textContent = new Date().toLocaleString('zh-CN');
}
document.getElementById('search').addEventListener('input', e => applyFilter(e.target.value));
document.getElementById('expand-all').addEventListener('click', expandAll);
document.getElementById('collapse-all').addEventListener('click', collapseAll);
document.getElementById('copy-path').addEventListener('click', () => {
  clickToCopy = !clickToCopy;
  const btn = document.getElementById('copy-path');
  btn.textContent = clickToCopy ? '✓ 单击复制已开启' : '点文件/文件夹 → 复制路径';
  btn.style.borderColor = clickToCopy ? 'var(--accent)' : '';
  btn.style.color = clickToCopy ? 'var(--accent)' : '';
  if (clickToCopy) showToast('现在单击任意文件/文件夹名 = 复制完整路径到剪贴板');
});
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    const s = document.getElementById('search');
    s.value = '';
    applyFilter('');
    s.blur();
  }
});
load();
</script>
